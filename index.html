<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NextMind Premium</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
overflow:hidden;
background:black;
color:white;
}

/* LOADER NETFLIX */
#loader{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
font-weight:bold;
letter-spacing:8px;
color:red;
z-index:10;
animation:fadeOut 1s ease forwards;
animation-delay:2s;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* FUNDO 3D */
#bg{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* CONTEÚDO */
.container{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 0 40px cyan;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
background:cyan;
color:black;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}

.pix{
background:#0d1325;
padding:12px;
border-radius:8px;
margin-top:10px;
word-break:break-all;
}
</style>
</head>

<body>

<div id="loader">NEXTMIND</div>
<canvas id="bg"></canvas>

<div class="container">
<div class="box">

<h2>🚀 NextMind Premium</h2>
<p>Acesso completo aos cursos</p>

<p><strong>Mensal:</strong> R$ 15,00</p>
<p><strong>Anual:</strong> R$ 120,00</p>

<h3>PIX</h3>
<div class="pix" id="pixKey">kbmm40245@gmail.com</div>

<button onclick="copiarPix()">Copiar chave PIX</button>

<a href="https://wa.me/5513988238928?text=Olá!%20Já%20realizei%20o%20pagamento.%0A%0A📌%20Plano:%0A📌%20WhatsApp:%0A📌%20Gmail:%0A📎%20Segue%20o%20comprovante:" target="_blank">
<button>Enviar comprovante</button>
</a>

<a href="login.html">
<button>Já sou aluno</button>
</a>

</div>
</div>

<script>
function copiarPix(){
var chave=document.getElementById("pixKey").innerText;
navigator.clipboard.writeText(chave);
alert("Chave PIX copiada!");
}

/* FUNDO 3D */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('bg'),alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
camera.position.z=5;

const geometry=new THREE.BoxGeometry();
const material=new THREE.MeshBasicMaterial({color:0x00ffff,wireframe:true});
const cubes=[];

for(let i=0;i<40;i++){
const cube=new THREE.Mesh(geometry,material);
cube.position.x=(Math.random()-0.5)*20;
cube.position.y=(Math.random()-0.5)*20;
cube.position.z=(Math.random()-0.5)*20;
scene.add(cube);
cubes.push(cube);
}

function animate(){
requestAnimationFrame(animate);
cubes.forEach(c=>{
c.rotation.x+=0.01;
c.rotation.y+=0.01;
});
renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
renderer.setSize(window.innerWidth,window.innerHeight);
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
});
</script>

</body>
