<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextMind Premium</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
overflow:hidden;
background:#000;
color:white;
}

/* FUNDO 3D */
#bg{
position:fixed;
top:0;
left:0;
z-index:-2;
}

/* TELA INICIAL */
.home{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(12px);
transition:1s;
z-index:5;
}

.home h1{
font-size:48px;
margin-bottom:50px;
letter-spacing:4px;
text-shadow:0 0 30px cyan;
}

.btn{
padding:18px 50px;
margin:15px;
border:none;
border-radius:40px;
font-size:18px;
cursor:pointer;
background:linear-gradient(45deg,cyan,blue);
color:white;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 25px cyan;
}

/* PLATAFORMA */
.platform{
position:absolute;
width:100%;
height:100vh;
display:none;
padding:70px 6%;
overflow:auto;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(6px);
}

.topo{
font-size:26px;
margin-bottom:40px;
text-shadow:0 0 20px cyan;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:35px;
}

.card{
height:200px;
border-radius:20px;
overflow:hidden;
cursor:pointer;
position:relative;
transition:.5s;
transform-style:preserve-3d;
box-shadow:0 25px 60px rgba(0,0,0,.7);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(60%);
transition:.5s;
}

.card h2{
position:absolute;
bottom:20px;
left:20px;
z-index:2;
font-size:16px;
text-shadow:0 0 15px cyan;
}

.card:hover{
transform:rotateY(15deg) rotateX(10deg) scale(1.1);
}

.card:hover img{
filter:brightness(100%);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- TELA INICIAL -->
<div class="home" id="home">
<h1>NEXTMIND</h1>
<button class="btn" onclick="assinar()">Quero Assinar</button>
<button class="btn" onclick="entrar()">Já Sou Aluno</button>
</div>

<!-- PLATAFORMA -->
<div class="platform" id="platform">

<div class="topo">Biblioteca Premium</div>

<div class="grid">

<h2>Artes Marciais</h2>

<div class="card" onclick="abrir('https://drive.google.com/drive/folders/1Wh8LD24-B8iiJvmkyy_nnVn_6gt04f7r')">

<div class="card" onclick="abrir('https://drive.google.com/drive/folders/12DbWmPDFcgs_mM_R6cCSrxrHejiBIMOG')">

<script>
function assinar(){
alert("Aqui você pode colocar sua página de pagamento ou link do Pix.");
}

function entrar(){
document.getElementById("home").style.opacity="0";
setTimeout(()=>{
document.getElementById("home").style.display="none";
document.getElementById("platform").style.display="block";
},800);
}

function abrir(link){
window.open(link,'_blank');
}

/* FUNDO 3D */
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('bg'),alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);

camera.position.z=5;

const geometry=new THREE.BoxGeometry();
const material=new THREE.MeshStandardMaterial({color:0x00ffff,wireframe:true});
const cubes=[];

for(let i=0;i<60;i++){
const cube=new THREE.Mesh(geometry,material);
cube.position.x=(Math.random()-0.5)*25;
cube.position.y=(Math.random()-0.5)*25;
cube.position.z=(Math.random()-0.5)*25;
scene.add(cube);
cubes.push(cube);
}

const light=new THREE.PointLight(0x00ffff,2);
light.position.set(10,10,10);
scene.add(light);

function animate(){
requestAnimationFrame(animate);
cubes.forEach(c=>{
c.rotation.x+=0.01;
c.rotation.y+=0.01;
});
renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
renderer.setSize(window.innerWidth,window.innerHeight);
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
});
</script>

</body>
</html>
