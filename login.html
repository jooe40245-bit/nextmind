<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextMind - Área do Aluno</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#001a33,#003366,#001a33);
background-size:400% 400%;
animation:fundo 15s ease infinite;
color:white;
overflow:hidden;
}

@keyframes fundo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
background:#000000dd;
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0 0 40px #00ffff33;
}

h1{
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:20px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#008080;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00aaaa;
}

.mensagem{
margin-top:15px;
font-weight:bold;
}

.vencido{
color:#ff4d4d;
}

.ativo{
color:#00ff99;
}
</style>
</head>
<body>

<div class="container">
<h1>Área do Aluno</h1>

<input type="text" id="whatsapp" placeholder="Digite seu WhatsApp">

<button onclick="verificar()">Entrar</button>

<div id="mensagem" class="mensagem"></div>

</div>

<script>

// ===== LISTA MANUAL DE ALUNOS =====
// Você vai editar aqui manualmente

const alunos = [
{
whats: "13991442800",
vencimento: "2026-03-30"
},
{
whats: "11999999999",
vencimento: "2025-01-10"
}
];

function verificar(){

let numero = document.getElementById("whatsapp").value.replace(/\D/g,'');
let hoje = new Date();
let msg = document.getElementById("mensagem");

let aluno = alunos.find(a => a.whats === numero);

if(!aluno){
msg.innerHTML = "❌ Você ainda não possui assinatura.";
msg.className = "mensagem vencido";
return;
}

let dataVenc = new Date(aluno.vencimento);

if(dataVenc < hoje){
msg.innerHTML = "❌ Sua assinatura venceu.";
msg.className = "mensagem vencido";
return;
}

// SE ESTIVER ATIVO
msg.innerHTML = "✅ Acesso liberado!";
msg.className = "mensagem ativo";

// redireciona após 1 segundo
setTimeout(()=>{
window.location.href = "index.html";
},1000);

}

</script>

</body>
</html>
