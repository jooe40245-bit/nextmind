<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NextMind - Área do Aluno</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#021024,#03254c);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:20px;
width:400px;
text-align:center;
box-shadow:0 0 30px rgba(0,255,255,0.4);
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:8px;
background:cyan;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px cyan;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>Área do Aluno</h2>
<input type="text" id="whats" placeholder="Digite seu WhatsApp">
<button onclick="login()">Entrar</button>
</div>

<div class="box hidden" id="areaAluno">
<h2>Bem-vindo ao NextMind</h2>
<p>Acesso liberado</p>

<a href="https://drive.google.com/drive/folders/12dVt6qKUWJti_4Q4MWQIs8GTE-u_fIn9?usp=sharing" target="_blank">
<button>Acessar todos os cursos</button>
</a>
</div>

<script>
async function login(){

var whats = document.getElementById("whats").value;

if(whats.trim() === ""){
alert("Digite seu WhatsApp");
return;
}

try{

const resposta = await fetch(
"https://script.google.com/macros/s/AKfycby4nEQjdmfFuv3UnSQZ3zkiY1MhB4U7hkFMGvW45LwvmIewz7cdVs9lpKCIHqeYLoV3/exec?whats=" + whats
);

const status = await resposta.text();

if(status.trim() === "ATIVO"){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("areaAluno").classList.remove("hidden");
}
else if(status.trim() === "VENCIDO"){
alert("Seu acesso está vencido.");
}
else{
alert("WhatsApp não encontrado.");
}

}catch(e){
alert("Erro ao verificar acesso.");
}

}
</script>

</body>
</html>
