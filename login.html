<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextMind - Área do Aluno</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#000814,#001d3d,#003566,#001d3d);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
color:white;
overflow:hidden;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.box{
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
width:380px;
text-align:center;
box-shadow:0 0 60px rgba(0,255,255,0.2);
opacity:1;
transition:0.5s;
}

h2{
margin-bottom:25px;
font-weight:normal;
letter-spacing:1px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:20px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#00e5ff;
color:#000;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00bcd4;
}

.hidden{
display:none;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
letter-spacing:3px;
z-index:999;
animation:fadeIn 0.5s;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.btn{
display:block;
margin-top:20px;
padding:15px;
background:#00e5ff;
color:#000;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>LOGIN DO ALUNO</h2>
<input type="text" id="whats" placeholder="Digite seu WhatsApp">
<button onclick="login()">Entrar</button>
</div>

<div class="box hidden" id="areaAluno">
<h2>BEM-VINDO AO NEXTMIND</h2>
<p>Acesso liberado aos cursos</p>

<a href="https://drive.google.com/drive/folders/12dVt6qKUWJti_4Q4MWQIs8GTE-u_fIn9?usp=sharing"
target="_blank"
class="btn">
Acessar Cursos
</a>
</div>

<div class="loading hidden" id="loading">
VERIFICANDO ACESSO...
</div>

<script>

async function login(){

let whatsDigitado = document.getElementById("whats").value;

// limpa tudo que não for número
whatsDigitado = whatsDigitado.replace(/\D/g,'');

// remove 55 se vier com código do Brasil
if(whatsDigitado.startsWith("55") && whatsDigitado.length > 11){
whatsDigitado = whatsDigitado.substring(2);
}

if(whatsDigitado === ""){
alert("Digite seu WhatsApp");
return;
}

document.getElementById("loading").classList.remove("hidden");

try{

const resposta = await fetch(
"https://script.google.com/macros/s/AKfycby4nEQjdmfFuv3UnSQZ3zkiY1MhB4U7hkFMGvW45LwvmIewz7cdVs9lpKCIHqeYLoV3/exec?whats="+whatsDigitado
);

const status = await resposta.text();

setTimeout(function(){

document.getElementById("loading").classList.add("hidden");

if(status.trim()==="ATIVO"){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("areaAluno").classList.remove("hidden");
}
else if(status.trim()==="VENCIDO"){
alert("Seu acesso está vencido. Renove sua assinatura.");
}
else{
alert("WhatsApp não encontrado.");
}

},800);

}catch(e){
document.getElementById("loading").classList.add("hidden");
alert("Erro ao verificar acesso.");
}

}

</script>

</body>
</html>
