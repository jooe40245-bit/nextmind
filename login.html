<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextMind - Área do Aluno</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#001a33,#003366,#001a33);
background-size:400% 400%;
animation:fundo 15s ease infinite;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

@keyframes fundo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.box{
background:#000000dd;
padding:40px;
border-radius:20px;
width:360px;
text-align:center;
box-shadow:0 0 40px #00ffff33;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:10px;
margin-bottom:20px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#008080;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00aaaa;
}

.mensagem{
margin-top:15px;
font-weight:bold;
}

.erro{
color:#ff4d4d;
}

.sucesso{
color:#00ff99;
}
</style>
</head>
<body>

<div class="box">
<h2>Área do Aluno</h2>

<input type="text" id="whats" placeholder="Digite seu WhatsApp">
<button onclick="login()">Entrar</button>

<div id="mensagem" class="mensagem"></div>
</div>

<script>

async function login(){

const numero = document.getElementById("whats").value.replace(/\D/g,'');
const msg = document.getElementById("mensagem");

if(numero === ""){
msg.innerHTML = "Digite seu WhatsApp.";
msg.className = "mensagem erro";
return;
}

try{

const resposta = await fetch(
"https://script.google.com/macros/s/AKfycby4nEQjdmfFuv3UnSQZ3zkiY1MhB4U7hkFMGvW45LwvmIewz7cdVs9lpKCIHqeYLoV3/exec?whats=" + numero
);

const dados = await resposta.json();

/*
O Apps Script deve retornar:
{
status: "ATIVO" ou "VENCIDO" ou "NAO_ENCONTRADO",
vencimento: "09/04/2026"
}
*/

if(dados.status === "NAO_ENCONTRADO"){
msg.innerHTML = "❌ Você ainda não possui assinatura.";
msg.className = "mensagem erro";
return;
}

if(dados.status === "VENCIDO"){
msg.innerHTML = "❌ Sua assinatura venceu.";
msg.className = "mensagem erro";
return;
}

if(dados.status === "ATIVO"){

msg.innerHTML = "✅ Acesso liberado!";
msg.className = "mensagem sucesso";

setTimeout(()=>{
window.location.href = "index.html";
},1000);

}

}catch(e){

msg.innerHTML = "Erro ao verificar acesso.";
msg.className = "mensagem erro";

}

}

</script>

</body>
</html>
